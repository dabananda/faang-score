<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-ZK3X886P17"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-ZK3X886P17");
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔥 FAANG Scorecard + Share</title>
    <!-- Tailwind CSS & custom font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- canvas-confetti for celebration -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <!-- html2canvas for screenshots -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-4 transition-colors duration-500"
  >
    <div
      class="max-w-3xl w-full bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-6 md:p-8 border border-white/30"
    >
      <!-- header -->
      <div class="text-center mb-6">
        <h1
          class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-2"
        >
          🔥 FAANG Scorecard
        </h1>
        <p class="text-gray-600">Your GitHub profile vs top tech companies</p>
      </div>

      <!-- input area -->
      <div class="flex flex-col sm:flex-row gap-3">
        <input
          type="text"
          id="usernameInput"
          placeholder="e.g., octocat"
          class="flex-1 px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition shadow-sm"
        />
        <button
          id="fetchBtn"
          class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl transition duration-200 ease-in-out transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2 shadow-md"
        >
          Get my score
        </button>
      </div>

      <!-- result card (hidden initially) -->
      <div id="resultCard" class="mt-8 hidden transition-all duration-300">
        <!-- loading spinner -->
        <div
          id="loadingSpinner"
          class="flex flex-col items-center justify-center py-8 hidden"
        >
          <div
            class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-200 border-t-indigo-600 mb-3"
          ></div>
          <p class="text-indigo-500 font-medium">Crunching GitHub data...</p>
        </div>

        <!-- content shown after successful fetch (this is what we capture) -->
        <div id="resultContent" class="hidden capture-card fade-scale-enter">
          <!-- avatar & basic info -->
          <div class="flex items-center gap-4 mb-6">
            <img
              id="avatarImg"
              src=""
              alt="avatar"
              class="w-16 h-16 rounded-full border-4 border-indigo-100 avatar-pulse transition-all duration-500"
              crossorigin="anonymous"
            />
            <div>
              <h2 id="userName" class="text-xl font-bold text-gray-800"></h2>
              <p id="userLogin" class="text-indigo-600">
                @
                <span></span>
              </p>
            </div>
          </div>

          <!-- STATS SECTION -->
          <div id="statsSection" class="grid grid-cols-3 gap-3 mb-6">
            <div class="stat-item text-center">
              <div
                class="text-xs text-gray-600 font-semibold uppercase tracking-wide"
              >
                Lines of code
              </div>
              <div id="linesCount" class="text-xl font-bold text-indigo-700">
                0
              </div>
            </div>
            <div class="stat-item text-center">
              <div
                class="text-xs text-gray-600 font-semibold uppercase tracking-wide"
              >
                Coding time
              </div>
              <div id="timeSpent" class="text-xl font-bold text-indigo-700">
                0 hrs
              </div>
            </div>
            <div class="stat-item text-center">
              <div
                class="text-xs text-gray-600 font-semibold uppercase tracking-wide"
              >
                Total commits
              </div>
              <div id="commitsCount" class="text-xl font-bold text-indigo-700">
                0
              </div>
            </div>
          </div>

          <!-- SIMILAR USER SECTION -->
          <div
            id="similarSection"
            class="mb-6 p-4 bg-amber-50 rounded-xl border border-amber-200 flex items-center gap-3"
          >
            <span class="text-2xl">🌟</span>
            <div>
              <p class="text-sm text-amber-800 font-medium">
                You're similar to
              </p>
              <p
                id="similarUser"
                class="text-base font-semibold text-amber-900"
              >
                @user — got into FAANG
              </p>
            </div>
          </div>

          <!-- company scores grid (brand colored) -->
          <div
            id="scoresGrid"
            class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6"
          >
            <!-- filled dynamically -->
          </div>
        </div>

        <!-- action buttons -->
        <div class="flex flex-wrap gap-3 mt-4">
          <button
            id="captureBtn"
            class="px-4 py-2 bg-white border border-indigo-300 text-indigo-700 rounded-lg hover:bg-indigo-50 transition font-medium"
          >
            📸 Capture & Download
          </button>
        </div>

        <!-- social share row (hidden until capture) -->
        <div id="shareRow" class="mt-4 hidden flex-wrap gap-2 justify-center">
          <button id="shareFb" class="social-btn">
            <span>📘</span>
            Facebook
          </button>
          <button id="shareTwitter" class="social-btn">
            <span>🐦</span>
            Twitter
          </button>
          <button id="shareLinkedin" class="social-btn">
            <span>🔗</span>
            LinkedIn
          </button>
          <button id="shareIg" class="social-btn">
            <span>📷</span>
            Instagram
          </button>
        </div>

        <!-- error message -->
        <div
          id="errorDisplay"
          class="mt-4 p-4 bg-rose-50 text-rose-700 rounded-xl border border-rose-200 hidden"
        ></div>
      </div>

      <!-- footer -->
      <p class="text-xs text-gray-400 text-center mt-6">
        Stats are estimates based on your profile
      </p>
    </div>
    <script src="main.js"></script>
  </body>
</html>
